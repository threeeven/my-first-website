<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永久日记本</title>
    <style>
        /* 样式省略，可复制之前的 */
        body { font-family: system-ui; max-width: 800px; margin: 0 auto; padding: 20px; }
        .add-diary { background: #f3f4f6; padding: 20px; border-radius: 24px; }
        input, textarea { width: 100%; margin: 8px 0; padding: 10px; border-radius: 16px; border: 1px solid #ddd; }
        button { background: #ff8c42; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
        .diary-card { background: white; border-radius: 24px; padding: 16px; margin-top: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .delete-btn { background: none; color: #e74c3c; float: right; }
    </style>
</head>
<body>
<h1>📔 日记本 (Supabase版)</h1>
<div class="add-diary">
    <input type="text" id="titleInput" placeholder="标题">
    <textarea id="contentInput" placeholder="写点什么..."></textarea>
    <button id="saveBtn">保存日记</button>
</div>
<div id="diaryContainer"></div>

<script>
    const API_URL = '/api/diaries';

    async function load() {
        const res = await fetch(API_URL);
        const diaries = await res.json();
        const container = document.getElementById('diaryContainer');
        if (!diaries.length) {
            container.innerHTML = '<p>还没有日记，写一篇吧～</p>';
            return;
        }
        container.innerHTML = diaries.map(d => `
            <div class="diary-card">
                <div><strong>${escapeHtml(d.title)}</strong> <span style="color:#888;">${new Date(d.created_at).toLocaleString()}</span></div>
                <div>${escapeHtml(d.content).replace(/\n/g,'<br>')}</div>
                <button class="delete-btn" data-id="${d.id}">删除</button>
            </div>
        `).join('');
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
                load();
            });
        });
    }

    document.getElementById('saveBtn').onclick = async () => {
        const title = document.getElementById('titleInput').value;
        const content = document.getElementById('contentInput').value;
        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, content })
        });
        document.getElementById('titleInput').value = '';
        document.getElementById('contentInput').value = '';
        load();
    };

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    load();
</script>
</body>
</html>
